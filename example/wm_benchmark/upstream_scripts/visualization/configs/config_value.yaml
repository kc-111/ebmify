defaults:
  - world_model@datasets.tworoom.world_model: iql
  # - world_model@datasets.pusht.world_model: iql
  - _self_

cache_dir: null
device: cuda
seed: 42

image_size: 224
patch_size: 14

# ===============================
# Dataset / Environment definitions
# ===============================
datasets:
  tworoom:
    training_dataset: tworoom  # dataset used during training for preprocessing stats
    env:
      env_name: swm/TwoRoom-v1
      history_size: 1
      frame_skip: 1
      grid_size: 20
      default_variation: ["agent.position"]
      variations:
        - variation:
            fields: null
            values: null
    world_model:
      model_name: ivl_simplebis_tworoom_policy_epoch_9 #"iql_simplebis_tworoom_policy_epoch_9
  pusht:
    training_dataset: pusht_expert_train  # dataset used during training for preprocessing stats
    env:
      env_name: swm/PushT-v1
      history_size: 3
      frame_skip: 1
      grid_size: 20
      default_variation: ["agent.start_position"]
      variations:
        - variation:
            fields: null
            values: null
    world_model:
      model_name: ivl2_pusht_policy_epoch_9 # iql2_pusht_policy_epoch_9
