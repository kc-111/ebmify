# Copied verbatim from stable-worldmodel @ 463ab63517b043ca6c3753b01e34ea6f145497c6
# Source: https://github.com/galilai-group/stable-worldmodel/blob/463ab63517b043ca6c3753b01e34ea6f145497c6/scripts/plan/config/tworoom.yaml
# License: MIT (see example/wm_benchmark/ATTRIBUTION.md)
defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/TwoRoom-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget
seed: 42
policy: gcbc # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: tworoom.h5
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: pos_agent
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_pos_agent

output:
  filename: tworoom_results.txt
