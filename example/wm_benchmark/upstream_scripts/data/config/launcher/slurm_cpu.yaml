# SLURM launcher configuration (CPU)

defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  launcher:
    max_num_timeout: 999
    cpus_per_task: 8
    mem_gb: 256
    timeout_min: 1440
    partition: long-cpu
    signal_delay_s: 120
